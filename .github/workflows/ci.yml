name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    if: github.event_name != 'issue_comment'
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Test
        run: go test ./... -race

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run

  frontend:
    name: Frontend (Nuxt / pmo-dashboard)
    runs-on: ubuntu-latest
    if: github.event_name != 'issue_comment'
    defaults:
      run:
        working-directory: apps/pmo-dashboard

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/pmo-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

  # PR 作成・更新時に自動でコードレビューを実行する（自リポジトリ発の PR のみ）。
  pr-agent:
    name: PR Agent
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@009ba5a116c4d3273368a6dc53a4efdb7904d519 # main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          config.model: openai/gpt-5-codex
          # PR Agent の MAX_TOKENS レジストリに無いモデルは上限の明示が必須（無いと即エラー→fallback）
          config.custom_model_max_tokens: "200000"

  # PR コメントのスラッシュコマンド（/review, /improve, /describe 等）に応答する。
  # 権限のあるメンバーのコメントのみ許可する。
  pr-agent-slash-command:
    name: PR Agent (Slash Command)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run PR Agent (Slash Command)
        uses: qodo-ai/pr-agent@009ba5a116c4d3273368a6dc53a4efdb7904d519 # main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          config.model: openai/gpt-5-codex
          # PR Agent の MAX_TOKENS レジストリに無いモデルは上限の明示が必須（無いと即エラー→fallback）
          config.custom_model_max_tokens: "200000"
