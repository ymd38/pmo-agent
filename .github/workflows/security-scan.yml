name: Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Detect secrets
        # .gitleaks.toml は未配置のため gitleaks の既定ルールで全履歴を走査する。
        run: gitleaks detect --source . --log-opts="--all" --verbose

  trivy-fs:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # go.sum / package-lock.json / Dockerfile を横断して CVE・設定不備を検出する。
      # .trivyignore はリポジトリ直下に置かれていれば自動で参照される（未配置なら無視）。
      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '0'

  govulncheck:
    name: Go Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep==1.162.0

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/golang \
            --config p/typescript \
            .

  npm-audit:
    name: Frontend Dependency Audit (npm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pmo-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/pmo-dashboard/package-lock.json

      - name: Frontend dependency audit
        # --omit=dev: devDependencies（test-utils/storybook/eslint 等）は本番非同梱のため対象外。
        # worktrack は未構築（package.json なし）のため対象は pmo-dashboard のみ。
        run: npm audit --omit=dev --audit-level=high
